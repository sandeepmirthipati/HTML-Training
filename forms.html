<!-- create a registration form -->

<!DOCTYPE html>
<head>
<title>forms</title>
<style>
body{
	height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
}
table{
	
	text-align:center;
	padding:20px;
}
</style>
</head>
<body>
<table border:"1">
<caption><b><u>Registration form</b></u></caption>

<tr>
	<td>First Name</td>
	<td><input type="text"></td>
</tr>
<tr>
	<td>Last Name</td>
	<td><input type="text"></input></td>
</tr>
<tr>
	<td>e-mail</td>
	<td><input type="text"></input></td>
</tr>
<tr>
	<td>password</td>
	<td><input type="password" ></input></td>
</tr>
<tr>
	<td>Date of Birth</td>
	<td><input type="Date"></input></td>
</tr>
<tr>
	<td>Gender</td>
	<td><input type="radio" name="x">male</input>
	<input type="radio" name="x">female</input><br>
	</td>
</tr>
<tr>
	<td>Known Languages</td>
	<td><input type="checkbox">English</input><input type="checkbox">Telugu</input><input type="checkbox">Hindi</input</td>
</tr>
<tr>
	<td>Mobile</td>
	<td><input type="text"></input></td>
</tr>
<tr>
	<td>Address</td>
	<td><textarea></textarea></td>
</tr>
<tr>
	<td></td>
	<td><button>submit</button>            <button>Reset</button></td>
</table>

</body>
</html>
